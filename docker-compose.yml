version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9005:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      S3_BUCKET: ${S3_BUCKET:-vercel-clone-outputs}
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..." && sleep 2;
        done;
        mc mb --ignore-existing local/"$S3_BUCKET" &&
        mc anonymous set download local/"$S3_BUCKET"
    restart: "no"

  build-server:
    build: ./build-server
    image: vercel-clone-build-server:local
    profiles:
      - build

  api-server:
    build: ./api-server
    depends_on:
      - redis
      - minio
      - minio-init
    environment:
      REDIS_URL: redis://redis:6379
      S3_BUCKET: ${S3_BUCKET:-vercel-clone-outputs}
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_USE_SSL: "false"
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      S3_REGION: us-east-1
      BUILD_SERVER_IMAGE: vercel-clone-build-server:local
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      DOCKER_NETWORK: ${DOCKER_NETWORK:-vercel-clone_default}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9000:9000"
      - "9002:9002"

  s3-reverse-proxy:
    build: ./s3-reverse-proxy
    depends_on:
      - minio
    environment:
      OUTPUTS_BASE_URL: http://minio:9000/${S3_BUCKET:-vercel-clone-outputs}/__outputs
    ports:
      - "8000:8000"

  frontend-nextjs:
    build: ./frontend-nextjs
    environment:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/vercel_clone}
      MONGODB_DB: ${MONGODB_DB:-vercel_clone}
      INTERNAL_API_URL: http://api-server:9000
      NEXT_PUBLIC_API_URL: http://localhost:9000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:9002
      NEXT_PUBLIC_SOCKET_ENABLED: "false"
    ports:
      - "3000:3000"

volumes:
  minio-data:
  mongo-data:
